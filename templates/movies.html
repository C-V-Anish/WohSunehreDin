{% extends 'basic.html' %}
    {% load static %}
    {% block title %}Movies{% endblock %}
    {% block linkstylesheet %}
        <link rel="stylesheet" type="text/css" href="{% static '/css/movies.css' %}">
    {% endblock %} 

    {% block body %}

    <!-- Button trigger modal -->
<button type="button" class="btn btn-secondary btn-sm" id="addmov" data-bs-toggle="modal" data-bs-target="#exampleModalCenter">Add Movie</button>

<!-- Modal -->
<div class="modal fade" id="exampleModalCenter" tabindex="-1" role="dialog" aria-labelledby="exampleModalCenterTitle" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="exampleModalLongTitle">Modal title</h5>
        <button type="button" class="close" data-bs-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <form action="/movies/" method="post">
            {% csrf_token %}
                <label for="name">Movie Name :</label>
                <input type="text" name="name">
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            <button type="submit" class="btn btn-primary">Add</button>
        </form>
      </div>
    </div>
  </div>
</div>
    <div class="container">
        <div class="row">
            <div class="card" id="cscard">
                <img class="card-img-top" src="{% static 'images/kkk1964.jpg' %}" alt="Card image cap">
                <div class="card-body">
                  <h5 class="card-title" style="text-align:center;">Kashmir Ki Kali</h5>
                  <p class="card-text"></p>
                  <span id="btns">
                    <a href="#" class="btn btn-secondary btn-sm">View Details</a>
                    <a href="#" class="btn btn-secondary btn-sm mx-2">Watch-List</a>
                </span>
                </div>
            </div>
            
        </div>
    </div>

    {% endblock %}
