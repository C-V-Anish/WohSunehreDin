{% extends 'basic.html' %}
    {% load static %}
    {% block title %}Movies{% endblock %}
    {% block linkstylesheet %}
        <link rel="stylesheet" type="text/css" href="{% static '/css/movies.css' %}">
    {% endblock %} 

    {% block body %}

    <!-- Button trigger modal -->
<button type="button" class="btn btn-secondary btn-sm" id="addmov" data-bs-toggle="modal" data-bs-target="#exampleModalCenter">Add Movie</button>

<!-- Modal -->
<div class="modal fade" id="exampleModalCenter" tabindex="-1" role="dialog" aria-labelledby="exampleModalCenterTitle" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="exampleModalLongTitle">Add Movie</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form action="/movies/" method="post">
            {% csrf_token %}
                <label for="name">Movie Name :</label>
                <input type="text" name="name">
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            <button type="submit" class="btn btn-primary" id="search">Add</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% if image_pres %}
  <div class="container">
    <img class="card-img-top" src="{{image_link}}" alt="Card image cap" style="display: block;
    margin-left: auto;
    margin-right: auto;
    width: 32%;
    padding-top: 8px;">
    <h5 class="card-title" style="text-align:center;">{{movie_name}}</h5>
  </div>
  {% endif %}
 
        {% block jsdeclare %} <script src="{% static 'js/movies.js' %}"></script> {% endblock %}
    {% endblock %}
